<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nestiq — Real Estate Investment Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c0f;
    --surface: #0e1419;
    --surface2: #151d24;
    --border: #1e2d38;
    --accent: #00d4ff;
    --buy: #00e676;
    --negotiate: #ffb300;
    --walk: #ff3d5a;
    --text: #e8edf2;
    --muted: #5a7a8a;
    --mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,230,118,0.03) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: rgba(8,12,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .logo-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--buy);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px var(--buy);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── LAYOUT ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 40px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 32px;
    align-items: start;
  }

  /* ── FORM PANEL ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-icon {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .form-grid {
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }

  input::placeholder { color: var(--muted); }

  .submit-btn {
    margin: 0 24px 24px;
    width: calc(100% - 48px);
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    background: #33ddff;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.3);
  }

  .submit-btn:active { transform: translateY(0); }

  .submit-btn.loading {
    background: var(--surface2);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── RIGHT PANEL ── */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── VERDICT CARD ── */
  .verdict-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    display: none;
    animation: slideIn 0.4s ease;
  }

  .verdict-card.visible { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .verdict-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .verdict-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 20px;
  }

  .verdict-badge.BUY { color: var(--buy); text-shadow: 0 0 40px rgba(0,230,118,0.4); }
  .verdict-badge.NEGOTIATE { color: var(--negotiate); text-shadow: 0 0 40px rgba(255,179,0,0.4); }
  .verdict-badge.WALK { color: var(--walk); text-shadow: 0 0 40px rgba(255,61,90,0.4); }

  .property-name-display {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    font-family: var(--mono);
  }

  /* ── METRICS GRID ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .metric {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .metric-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .metric-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .metric-value.positive { color: var(--buy); }
  .metric-value.negative { color: var(--walk); }
  .metric-value.neutral { color: var(--negotiate); }

  /* ── DEAL HISTORY ── */
  .history-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .history-list {
    max-height: 320px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.15s;
    cursor: default;
  }

  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--surface2); }

  .history-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .history-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .history-verdict {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .history-verdict.BUY {
    background: rgba(0,230,118,0.12);
    color: var(--buy);
    border: 1px solid rgba(0,230,118,0.2);
  }
  .history-verdict.NEGOTIATE {
    background: rgba(255,179,0,0.12);
    color: var(--negotiate);
    border: 1px solid rgba(255,179,0,0.2);
  }
  .history-verdict.WALK, .history-verdict.WALK\ AWAY {
    background: rgba(255,61,90,0.12);
    color: var(--walk);
    border: 1px solid rgba(255,61,90,0.2);
  }

  .empty-state {
    padding: 32px 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── ERROR ── */
  .error-msg {
    background: rgba(255,61,90,0.08);
    border: 1px solid rgba(255,61,90,0.2);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--walk);
    display: none;
  }

  .error-msg.visible { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    main {
      grid-template-columns: 1fr;
      padding: 24px 20px;
    }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Nestiq</div>
  <div class="logo-tag">Investment Agent</div>
  <div class="status-dot"></div>
  <div class="status-text">API LIVE</div>
</header>

<main>
  <!-- LEFT: FORM -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon"></div>
        <div class="panel-title">Analyze a Deal</div>
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label>Property Name</label>
          <input type="text" id="property_name" placeholder="e.g. Auburn Duplex on Magnolia Ave" />
        </div>
        <div class="form-group">
          <label>Purchase Price ($)</label>
          <input type="number" id="purchase_price" placeholder="400000" />
        </div>
        <div class="form-group">
          <label>Monthly Rent ($)</label>
          <input type="number" id="monthly_rent" placeholder="3500" />
        </div>
        <div class="form-group">
          <label>Annual Taxes ($)</label>
          <input type="number" id="annual_taxes" placeholder="4200" />
        </div>
        <div class="form-group">
          <label>Annual Insurance ($)</label>
          <input type="number" id="annual_insurance" placeholder="2600" />
        </div>
        <div class="form-group">
          <label>Interest Rate (%)</label>
          <input type="number" id="interest_rate" placeholder="7" step="0.1" />
        </div>
        <div class="form-group">
          <label>Down Payment (%)</label>
          <input type="number" id="down_payment_percent" placeholder="25" />
        </div>
        <div class="form-group">
          <label>Repair Budget ($)</label>
          <input type="number" id="repair_budget" placeholder="10000" />
        </div>
        <div class="form-group">
          <label>Closing Costs ($)</label>
          <input type="number" id="closing_costs" placeholder="12000" />
        </div>
        <div class="form-group">
          <label>Annual HOA ($)</label>
          <input type="number" id="annual_hoa" placeholder="0" />
        </div>
      </div>

      <button class="submit-btn" id="analyzeBtn" onclick="analyzeDeal()">
        Run Analysis
      </button>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- RIGHT: RESULTS + HISTORY -->
  <div class="right-col">

    <!-- VERDICT CARD -->
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-label">Verdict</div>
      <div class="verdict-badge" id="verdictBadge"></div>
      <div class="property-name-display" id="propertyNameDisplay"></div>
      <div class="metrics-grid" id="metricsGrid"></div>
    </div>

    <!-- DEAL HISTORY -->
    <div class="history-panel">
      <div class="panel-header">
        <div class="panel-icon"></div>
        <div class="panel-title">Recent Deals</div>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-state">No deals analyzed yet</div>
      </div>
    </div>

  </div>
</main>

<script>
  const API = 'http://127.0.0.1:8000';

  async function analyzeDeal() {
    const btn = document.getElementById('analyzeBtn');
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('visible');

    const payload = {
      property_name: document.getElementById('property_name').value || 'Unnamed Property',
      purchase_price: parseFloat(document.getElementById('purchase_price').value) || 0,
      monthly_rent: parseFloat(document.getElementById('monthly_rent').value) || 0,
      annual_taxes: parseFloat(document.getElementById('annual_taxes').value) || 0,
      annual_insurance: parseFloat(document.getElementById('annual_insurance').value) || 0,
      interest_rate: parseFloat(document.getElementById('interest_rate').value) || 7,
      down_payment_percent: parseFloat(document.getElementById('down_payment_percent').value) || 25,
      repair_budget: parseFloat(document.getElementById('repair_budget').value) || 0,
      closing_costs: parseFloat(document.getElementById('closing_costs').value) || 0,
      annual_hoa: parseFloat(document.getElementById('annual_hoa').value) || 0,
    };

    btn.textContent = 'Analyzing...';
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API}/analyze-deal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      showVerdict(data);
      loadHistory();
    } catch (err) {
      errorMsg.textContent = `Error: ${err.message}. Make sure the API server is running.`;
      errorMsg.classList.add('visible');
    } finally {
      btn.textContent = 'Run Analysis';
      btn.classList.remove('loading');
    }
  }

  function showVerdict(data) {
    const card = document.getElementById('verdictCard');
    const badge = document.getElementById('verdictBadge');
    const nameDisplay = document.getElementById('propertyNameDisplay');
    const grid = document.getElementById('metricsGrid');

    const m = data.metrics;
    const verdict = data.verdict;
    const verdictClass = verdict === 'WALK AWAY' ? 'WALK' : verdict;

    badge.textContent = verdict;
    badge.className = `verdict-badge ${verdictClass}`;
    nameDisplay.textContent = data.property_name;

    const fmt = (n, prefix='$') => {
      if (typeof n !== 'number') return '—';
      return prefix + n.toLocaleString('en-US', {maximumFractionDigits: 0});
    };
    const pct = (n) => typeof n === 'number' ? (n * 100).toFixed(1) + '%' : '—';
    const sign = (n) => n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral';

    grid.innerHTML = `
      <div class="metric">
        <div class="metric-label">Monthly Cash Flow</div>
        <div class="metric-value ${sign(m.monthly_cash_flow)}">${fmt(m.monthly_cash_flow)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Cap Rate</div>
        <div class="metric-value">${pct(m.cap_rate)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Cash-on-Cash</div>
        <div class="metric-value ${sign(m.cash_on_cash_return)}">${pct(m.cash_on_cash_return)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">DSCR</div>
        <div class="metric-value ${m.dscr >= 1.2 ? 'positive' : m.dscr >= 1.0 ? 'neutral' : 'negative'}">${typeof m.dscr === 'number' ? m.dscr.toFixed(2) : '—'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">NOI</div>
        <div class="metric-value">${fmt(m.noi)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Cash Invested</div>
        <div class="metric-value">${fmt(m.total_cash_invested)}</div>
      </div>
    `;

    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API}/deals/recent?limit=8`);
      const data = await res.json();
      const list = document.getElementById('historyList');

      if (!data.deals || data.deals.length === 0) {
        list.innerHTML = '<div class="empty-state">No deals analyzed yet</div>';
        return;
      }

      list.innerHTML = data.deals.map(deal => {
        const verdict = deal.verdict || '—';
        const verdictClass = verdict === 'WALK AWAY' ? 'WALK AWAY' : verdict;
        const cashFlow = deal.monthly_cash_flow;
        const cfStr = typeof cashFlow === 'number'
          ? '$' + Math.abs(cashFlow).toLocaleString('en-US', {maximumFractionDigits: 0})
          : '—';
        const cfSign = typeof cashFlow === 'number' && cashFlow < 0 ? '-' : '+';

        return `
          <div class="history-item">
            <div>
              <div class="history-name">${deal.property_name || 'Unnamed'}</div>
              <div class="history-sub">${cfSign}${cfStr}/mo · Cap ${deal.cap_rate ? (deal.cap_rate * 100).toFixed(1) + '%' : '—'}</div>
            </div>
            <div class="history-verdict ${verdictClass}">${verdict}</div>
          </div>
        `;
      }).join('');
    } catch (err) {
      console.error('History load failed:', err);
    }
  }

  // Load history on page load
  loadHistory();
</script>
</body>
</html>
